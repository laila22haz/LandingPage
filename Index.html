<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Corner | رحلتك نحو الإنجاز</title>
    <!-- استدعاء خط عربي متناسق وراقي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #FAF9F6; /* لون أبيض مكسور/كريمي مريح للعين */
            color: #4A4A4A; /* رمادي داكن ناعم بدل الأسود القاصح */
            line-height: 1.6;
        }

        /* تنسيق الواجهة الرئيسية */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: #6B6B6B;
            margin-bottom: 2.5rem;
            max-width: 90%;
        }

        /* تنسيق الزر (CTA) */
        .cta-button {
            display: inline-block;
            background-color: #D4BBA5; /* لون ترابي/باستيل دافئ */
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 30px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(212, 187, 165, 0.3);
        }

        .cta-button:hover {
            background-color: #C3A78F;
            transform: translateY(-2px);
        }

        /* تجاوب الشاشات الصغيرة */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.2rem;
            }
            .hero-subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <h1 class="hero-title">رحلتكِ نحو الإنجاز تبدأ بخطة، وتكتمل بلمسة لون.</h1>
        <p class="hero-subtitle">
            اكتشفي تشكيلتنا الراقية من دفاتر التخطيط وكتب التلوين الهادفة. صُممت بعناية لتمنحكِ مساحة يومية من التركيز، الإبداع، والهدوء الداخلي.
        </p>
        <a href="#products" class="cta-button">ابدئي رحلتك الآن</a>
    </section>

</body>
</html>
